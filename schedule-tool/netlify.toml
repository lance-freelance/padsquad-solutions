# Campaign Timelines & Schedule Tool — SPA on Netlify
# Embed via iFrame on HubSpot landing page (solutions.padsquad.com)

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/"
  to = "/schedule-tool/"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
