# PadSquad Solutions Hub — Netlify root config
# Builds both sub-apps and merges them under a single publish directory.

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from   = "/schedule-tool/*"
  to     = "/schedule-tool/index.html"
  status = 200

[[redirects]]
  from   = "/cpm-calculator/*"
  to     = "/cpm-calculator/index.html"
  status = 200
